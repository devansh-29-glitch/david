name: Build David DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install JS dependencies
        working-directory: david-app
        run: bun install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: david-api
        run: pip install -r requirements.txt pyinstaller

      - name: Build backend binary
        working-directory: david-api
        run: |
          pyinstaller \
            --onefile \
            --name david-backend \
            --hidden-import psycopg2 \
            --hidden-import bcrypt \
            --distpath ../david-app/src-tauri/resources \
            main.py

      - name: Create models directory
        run: mkdir -p david-app/src-tauri/resources/models

      - name: Download Whisper model
        run: |
          curl -L --retry 5 --retry-delay 10 \
            -o david-app/src-tauri/resources/models/ggml-small.en.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin" || \
          echo "Whisper download failed - voice input will be unavailable"

      - name: Download Silero VAD
        run: |
          curl -L --retry 3 \
            -o david-app/src-tauri/resources/models/silero_vad_v4.onnx \
            "https://blob.handy.computer/silero_vad_v4.onnx" || \
          echo "VAD download failed"

      - name: Setup Fish Speech
        run: |
          mkdir -p david-app/src-tauri/resources/fish-speech
          pip install huggingface_hub
          python3 << 'EOF'
          from huggingface_hub import hf_hub_download
          import os
          dest = "david-app/src-tauri/resources/fish-speech"
          os.makedirs(dest, exist_ok=True)
          try:
              hf_hub_download(repo_id="fishaudio/fish-speech-1.5", filename="model.pth", local_dir=dest)
              print("Fish Speech model downloaded")
          except Exception as e:
              print(f"Fish Speech download failed: {e} - voice will use Gemini TTS")
          EOF

      - name: Create RGBA icons
        working-directory: david-app/src-tauri
        run: |
          mkdir -p icons
          python3 << 'EOF'
          import struct, zlib

          def make_rgba_png(size):
              # RGBA format (required by Tauri) - indigo color with full alpha
              w = h = size
              # Each pixel: R=99 G=102 B=241 A=255
              raw = b''.join(b'\x00' + bytes([99, 102, 241, 255] * w) for _ in range(h))
              def chunk(t, d):
                  c = struct.pack('>I', len(d)) + t + d
                  return c + struct.pack('>I', zlib.crc32(t + d) & 0xffffffff)
              # Color type 6 = RGBA
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)) +
                      chunk(b'IDAT', zlib.compress(raw)) +
                      chunk(b'IEND', b''))

          for size, name in [(32, '32x32'), (128, '128x128'), (256, '128x128@2x')]:
              with open(f'icons/{name}.png', 'wb') as f:
                  f.write(make_rgba_png(size))
          print("RGBA icons created")

          # icon.icns
          with open('icons/icon.icns', 'wb') as f:
              png = make_rgba_png(512)
              f.write(b'icns')
              total = 8 + 8 + len(png)
              f.write(struct.pack('>I', total))
              f.write(b'ic09')
              f.write(struct.pack('>I', 8 + len(png)))
              f.write(png)

          # icon.ico - proper ICO format
          import struct
          png_64 = make_rgba_png(64)
          with open('icons/icon.ico', 'wb') as f:
              # ICO header: reserved=0, type=1 (icon), count=1
              f.write(struct.pack('<HHH', 0, 1, 1))
              # Directory entry: width, height, colors, reserved, planes, bitcount, size, offset
              offset = 6 + 16  # header + one directory entry
              f.write(struct.pack('<BBBBHHII', 64, 64, 0, 0, 1, 32, len(png_64), offset))
              f.write(png_64)

          print("All icons created successfully")
          EOF

      - name: Build Tauri app
        working-directory: david-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: bun run tauri build --target universal-apple-darwin

      - name: Find DMG
        id: dmg
        run: |
          DMG=$(find david-app/src-tauri/target -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found"
            exit 1
          fi
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "DMG: $DMG"
          ls -lh "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: David-macOS-DMG
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: David ${{ github.ref_name }}
          body: |
            ## David ${{ github.ref_name }}
            An ambient AI that lives with you.
            ### Install
            1. Download David.dmg
            2. Open → drag to Applications
            3. Right-click David → Open (bypasses Gatekeeper)
            4. Grant Screen Recording permission
            5. Create account → done
          files: ${{ steps.dmg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
